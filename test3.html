<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartGate Pro - Recherche BDD</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- CSS GLOBAL & VARIABLES --- */
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8; --accent: #3b82f6;
            --success: #10b981; --success-bg: #d1fae5;
            --danger: #ef4444; --danger-bg: #fee2e2;
            --warning: #f59e0b; --warning-bg: #fef3c7;
            --bg-body: #f8fafc; --card-bg: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b;
            --border-light: #e2e8f0; --input-bg: #f8fafc;
            --radius-lg: 16px; --radius-md: 12px;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a; --card-bg: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border-light: #334155; --input-bg: #0f172a;
            --success-bg: rgba(16, 185, 129, 0.15);
            --danger-bg: rgba(239, 68, 68, 0.15);
            --warning-bg: rgba(245, 158, 11, 0.15);
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body); margin: 0; padding: 0; color: var(--text-main); 
            transition: background-color 0.3s ease; user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- LOGIN --- */
        .lycee-title { position: absolute; top: 40px; width: 100%; text-align: center; font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; z-index: 10; text-shadow: 0 2px 4px rgba(255,255,255,0.8); }
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg-body); position: relative; overflow: hidden; transition: 0.3s; z-index: 1000; padding: 20px;}
        .login-card { background: var(--card-bg); padding: clamp(20px, 5vw, 50px); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); text-align: center; width: 100%; max-width: 450px; border: 1px solid var(--border-light); z-index: 1; }
        .login-card h1 { margin-bottom: 5px; font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 700; }
        .login-card input { width: 100%; padding: 16px; margin-bottom: 20px; border: 2px solid var(--border-light); border-radius: var(--radius-md); font-size: 1.1rem; color: var(--text-main); background: var(--input-bg); }
        .login-card input:focus { border-color: var(--primary); outline: none; }
        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-primary:active { transform: scale(0.98); background: var(--primary-hover); }

        /* --- DASHBOARD --- */
        #dashboard-screen { display: none; animation: slideUpFade 0.5s; flex: 1; flex-direction: column; overflow: hidden; width: 100%; }
        nav { background: var(--card-bg); padding: 15px clamp(15px, 3vw, 30px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); flex-shrink: 0; }
        .brand { font-size: clamp(1.2rem, 3vw, 1.6rem); font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .nav-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; font-size: clamp(1rem, 2vw, 1.4rem); color: var(--primary); letter-spacing: 1px; white-space: nowrap; }
        .nav-actions { display: flex; gap: clamp(8px, 2vw, 15px); align-items: center; }
        .btn-nav { background: var(--input-bg); border: 1px solid var(--border-light); border-radius: 50%; cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; width: clamp(40px, 8vw, 50px); height: clamp(40px, 8vw, 50px); font-size: 1.1rem; flex-shrink: 0; }
        .btn-nav:active { transform: scale(0.95); }
        .clock { font-weight: 700; color: var(--primary); background: rgba(37, 99, 235, 0.1); padding: 10px 15px; border-radius: 25px; font-size: clamp(0.9rem, 2vw, 1.1rem); white-space: nowrap; }

        .container { flex: 1; padding: clamp(10px, 2vw, 20px) clamp(10px, 3vw, 30px); display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; width: 100%; }
        
        .main-grid { 
            display: grid; 
            grid-template-columns: minmax(0, 1fr) 350px; 
            gap: 20px; 
            flex: 1; 
            width: 100%;
        }
        
        .panel { background: var(--card-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: clamp(15px, 3vw, 25px); border: 1px solid var(--border-light); display: flex; flex-direction: column; min-width: 0; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-light); flex-shrink: 0; }
        .panel-header h2 { margin: 0; font-size: clamp(1.1rem, 2.5vw, 1.3rem); font-weight: 700; display: flex; align-items: center; gap: 10px; }

        /* Moteur Recherche */
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; background: var(--input-bg); padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--border-light); }
        .search-group { display: flex; flex-direction: column; gap: 5px; }
        .search-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .search-group input, .search-group select { padding: 12px; border: 1px solid var(--border-light); border-radius: 8px; font-size: 1rem; background: var(--card-bg); color: var(--text-main); width: 100%; }

        /* Tableaux Responsive */
        .table-container { 
            flex: 1; 
            overflow-y: auto; 
            overflow-x: auto; 
            border: 1px solid var(--border-light); 
            border-radius: var(--radius-md); 
            -webkit-overflow-scrolling: touch;
            background: var(--card-bg);
        }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead th { padding: 15px; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; background: var(--input-bg); position: sticky; top: 0; z-index: 2; white-space: nowrap; }
        tbody td { padding: 15px; border-bottom: 1px solid var(--border-light); vertical-align: middle; white-space: nowrap; }
        
        .student-identity { display: flex; align-items: center; gap: 12px; }
        .student-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--border-light); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; color: var(--text-muted); flex-shrink: 0;}
        .student-name { font-weight: 700; font-size: 1rem; display: block;}
        .student-ddn { font-size: 0.8rem; color: var(--text-muted); display: block;}

        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
        .bg-green { background: var(--success-bg); color: var(--success); }
        .bg-gray { background: var(--input-bg); color: var(--text-muted); border: 1px solid var(--border-light); }
        
        .class-badge { background: var(--input-bg); padding: 6px 12px; border-radius: 8px; font-weight: 600; border: 1px solid var(--border-light); font-size: 0.9rem; white-space: nowrap; display: inline-block; }

        .btn-autoriser { background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; transition: var(--transition);}
        .btn-autoriser:active { transform: scale(0.95); }
        .btn-autoriser:disabled { background: var(--border-light); color: var(--text-muted); cursor: not-allowed; transform: none; }

        /* Historique & Graphique */
        .left-panels { display: flex; flex-direction: column; gap: 20px; height: 100%; min-width: 0;}
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; min-height: 250px;}
        .history-item { padding: 12px; border-radius: 8px; background: var(--input-bg); border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;}
        .history-content { flex: 1; min-width: 150px; }
        .history-time { font-weight: 700; color: var(--text-muted); font-size: 0.8rem; }
        
        .btn-undo { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: var(--transition); display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;}
        .btn-undo:active { background: var(--danger); color: white; transform: scale(0.95); }

        .chart-container { height: 200px; width: 100%; margin-top: 10px; position: relative;}

        /* Modals */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 15px; overflow-y: auto;}
        .modal-content { background: var(--card-bg); margin: auto; padding: clamp(20px, 4vw, 35px); border-radius: var(--radius-lg); width: 100%; max-width: 500px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); animation: slideUpFade 0.3s; border: 1px solid var(--border-light); position: relative; top: 50%; transform: translateY(-50%);}
        .modal-header { font-size: clamp(1.2rem, 3vw, 1.5rem); font-weight: 700; margin-bottom: 20px; color: var(--primary); display: flex; justify-content: space-between; align-items: center;}
        
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px;}
        .toast { background: var(--card-bg); border: 1px solid var(--border-light); padding: 15px 20px; border-radius: var(--radius-md); box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1rem; animation: slideUpFade 0.3s, fadeOut 0.3s 3s forwards; width: 100%; justify-content: center;}
        
        .hidden { display: none !important; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); visibility: hidden; } }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; display: flex; flex-direction: column; }
            .left-panels { flex-direction: row; height: auto; }
            .left-panels .panel { flex: 1; }
        }

        @media (max-width: 768px) {
            .nav-center { display: none; }
            .left-panels { flex-direction: column; }
            
            /* Transformation du tableau en mode carte pour mobile */
            table, thead, tbody, th, td, tr { display: block; width: 100%; }
            thead tr { display: none; }
            tbody tr { margin-bottom: 15px; border: 1px solid var(--border-light); border-radius: var(--radius-md); background: var(--bg-body); padding: 10px; }
            tbody td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding: 10px 5px; text-align: right; white-space: normal; }
            tbody td:last-child { border-bottom: none; padding-bottom: 5px; }
            tbody td::before { content: attr(data-label); font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; margin-right: 15px; text-align: left; }
            
            .student-identity { text-align: right; justify-content: flex-end; }
            .student-avatar { display: none; } /* Gain de place sur mobile */
            
            .brand span { display: none; }
        }

        @media (max-width: 480px) {
            .search-grid { grid-template-columns: 1fr; }
            .btn-autoriser { width: 100%; justify-content: center; }
            tbody td { flex-direction: column; align-items: flex-start; gap: 5px; text-align: left;}
            tbody td::before { margin-right: 0; margin-bottom: 2px;}
            .student-identity { justify-content: flex-start; text-align: left;}
            .history-item { flex-direction: column; align-items: flex-start; }
            .btn-undo { width: 100%; justify-content: center; margin-top: 5px;}
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="lycee-title">Lycée JEAN JAURES</div>
        <div class="login-card">
            <h1>SmartGate Base</h1>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Accès au registre de la Vie Scolaire</p>
            <input type="text" id="username" placeholder="Identifiant" autocomplete="off">
            <input type="password" id="password" placeholder="Mot de passe" onkeypress="handleEnter(event)">
            <button class="btn-primary" onclick="verifierLogin()">
                <i class="fas fa-database"></i> Connexion BDD
            </button>
        </div>
    </div>

    <div id="dashboard-screen">
        <nav>
            <div class="brand">
                <i class="fas fa-server" style="color:var(--primary)"></i> SmartGate <span>Search</span>
            </div>
            <div class="nav-center">LYCÉE JEAN JAURES</div>
            <div class="nav-actions">
                <div class="clock" id="liveClock">00:00</div>
                <button class="btn-nav" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></button>
                <button class="btn-nav" onclick="seDeconnecter()" style="color: var(--danger); border-color: var(--danger-bg);"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div class="container">
            <div class="main-grid">
                
                <div class="panel">
                    <div class="panel-header">
                        <h2><i class="fas fa-search"></i> Recherche Élèves</h2>
                    </div>
                    
                    <div class="search-grid">
                        <div class="search-group"><label>Nom</label><input type="text" id="searchNom" placeholder="Ex: DUPONT" onkeyup="filtrerBDD()"></div>
                        <div class="search-group"><label>Prénom</label><input type="text" id="searchPrenom" placeholder="Ex: Jean" onkeyup="filtrerBDD()"></div>
                        <div class="search-group">
                            <label>Classe</label>
                            <select id="searchClasse" onchange="filtrerBDD()">
                                <option value="all">Toutes classes</option>
                                <option value="BTS CIEL 1">BTS CIEL 1</option>
                                <option value="BTS CIEL 2">BTS CIEL 2</option>
                                <option value="Terminale STI2D">Terminale STI2D</option>
                            </select>
                        </div>
                        <div class="search-group"><label>Date de Naissance</label><input type="tel" id="searchDDN" placeholder="JJ/MM/AAAA" onkeyup="filtrerBDD()"></div>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Profil Étudiant</th>
                                    <th>Classe</th>
                                    <th>Statut du jour</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>

                <div class="left-panels">
                    <div class="panel">
                        <div class="panel-header" style="margin-bottom: 10px;">
                            <h2><i class="fas fa-clipboard-check"></i> Journal des Entrées</h2>
                        </div>
                        <div class="history-list" id="historyList"></div>
                    </div>
                    
                    <div class="panel">
                        <div class="panel-header" style="margin-bottom: 0px; padding-bottom: 5px; border:none;">
                            <h2><i class="fas fa-chart-pie"></i> Motifs</h2>
                        </div>
                        <div class="chart-container">
                            <canvas id="motifsChart"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="modalAutorisation" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span><i class="fas fa-shield-check"></i> Autorisation</span> <i class="fas fa-times" style="color:var(--text-muted); cursor:pointer;" onclick="fermerModal()"></i></div>
            <div id="modalStudentName" style="font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; padding: 15px; background: var(--input-bg); border-radius: 10px;"></div>
            
            <div class="search-group" style="margin-bottom: 15px;">
                <label style="margin-bottom: 8px; display: block;">Motif de l'entrée sans badge :</label>
                <select id="modalMotif" onchange="checkMotifAutre()" style="padding: 14px; background: var(--bg-body);">
                    <option value="Oubli de carte">Oubli de carte (involontaire)</option>
                    <option value="Perte/Vol">Perte / Vol de carte</option>
                    <option value="Carte défectueuse">Carte défectueuse / Muette</option>
                    <option value="Nouvel élève">Nouvel élève (pas encore de badge)</option>
                    <option value="Autre">Autre motif...</option>
                </select>
                <input type="text" id="modalMotifAutre" class="hidden" placeholder="Précisez le motif..." style="margin-top: 10px; padding: 14px; background: var(--bg-body);">
            </div>

            <button class="btn-primary" style="background:var(--success); margin-top: 10px;" onclick="validerEntree()">
                <i class="fas fa-check-circle"></i> Valider l'entrée
            </button>
            <input type="hidden" id="modalStudentId">
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        /* --- UTILITAIRES --- */
        function vibrer(type = 'light') {
            if ("vibrate" in navigator) {
                if (type === 'light') navigator.vibrate(50);
                if (type === 'success') navigator.vibrate([50, 50, 50]);
                if (type === 'error') navigator.vibrate([200, 100, 200]);
            }
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div'); toast.className = 'toast';
            let icon = type === 'success' ? 'check-circle' : 'exclamation-triangle';
            let color = type === 'success' ? 'var(--success)' : 'var(--danger)';
            toast.innerHTML = `<i class="fas fa-${icon}" style="color:${color}; font-size:1.5rem;"></i> <span>${msg}</span>`;
            container.appendChild(toast); setTimeout(() => toast.remove(), 3000);
        }

        function updateClock() { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'}); }
        
        /* --- THEME --- */
        function initTheme() {
            const savedTheme = localStorage.getItem('smartGateTheme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-icon').className = savedTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
            Chart.defaults.color = savedTheme === 'light' ? '#64748b' : '#94a3b8'; 
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('smartGateTheme', next);
            document.getElementById('theme-icon').className = next === 'light' ? 'fas fa-moon' : 'fas fa-sun';
            vibrer();
            Chart.defaults.color = next === 'light' ? '#64748b' : '#94a3b8';
            updateChart(); 
        }

        /* --- LOGIN --- */
        function verifierLogin() {
            if(document.getElementById('username').value.trim() === "Waldo" && document.getElementById('password').value === "2006") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('dashboard-screen').style.display = "flex";
                vibrer('success'); showToast("Connexion BDD établie", "success");
                initApp();
            } else {
                vibrer('error'); showToast("Identifiant ou mot de passe erroné", "error");
            }
        }
        function seDeconnecter() { location.reload(); }
        function handleEnter(e) { if(e.key === 'Enter') verifierLogin(); }

        /* --- BDD SIMULÉE --- */
        let eleves_bdd = JSON.parse(localStorage.getItem('smartGateDB_v4')) || [
            { id: 1, nom: "MARTIN", prenom: "Thomas", classe: "BTS CIEL 1", ddn: "15/05/2005", etat: "non_entré" },
            { id: 2, nom: "DURAND", prenom: "Sarah", classe: "BTS CIEL 1", ddn: "22/11/2006", etat: "non_entré" },
            { id: 3, nom: "LEROY", prenom: "Julien", classe: "BTS CIEL 2", ddn: "03/01/2005", etat: "non_entré" },
            { id: 4, nom: "MOREAU", prenom: "Léa", classe: "Terminale STI2D", ddn: "10/08/2007", etat: "non_entré" },
            { id: 5, nom: "SIMON", prenom: "Lucas", classe: "BTS CIEL 2", ddn: "30/12/2006", etat: "non_entré" },
            { id: 6, nom: "DUPONT", prenom: "Maxime", classe: "BTS CIEL 1", ddn: "05/09/2004", etat: "non_entré" }
        ];
        
        let historique = JSON.parse(localStorage.getItem('smartGateHistory_v4')) || [];

        initTheme();
        
        function initApp() {
            updateClock(); setInterval(updateClock, 1000);
            filtrerBDD(); renderHistory(); updateChart();
        }

        function saveData() {
            localStorage.setItem('smartGateDB_v4', JSON.stringify(eleves_bdd));
            localStorage.setItem('smartGateHistory_v4', JSON.stringify(historique.slice(0, 50)));
        }

        /* --- MOTEUR DE RECHERCHE --- */
        function filtrerBDD() {
            const nomVal = document.getElementById('searchNom').value.toLowerCase();
            const prenomVal = document.getElementById('searchPrenom').value.toLowerCase();
            const classeVal = document.getElementById('searchClasse').value;
            const ddnVal = document.getElementById('searchDDN').value;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            let resultats = eleves_bdd.filter(e => {
                return e.nom.toLowerCase().includes(nomVal) && 
                       e.prenom.toLowerCase().includes(prenomVal) && 
                       (classeVal === 'all' || e.classe === classeVal) && 
                       e.ddn.includes(ddnVal);
            });

            if(resultats.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:30px; color:var(--text-muted);">Aucun résultat trouvé.</td></tr>`;
                return;
            }

            resultats.sort((a, b) => a.etat === 'entré' ? 1 : -1);

            resultats.forEach(eleve => {
                const row = document.createElement('tr');
                const isEntre = eleve.etat === 'entré';
                const badgeHTML = isEntre ? `<span class="badge bg-green"><i class="fas fa-check-circle"></i> Autorisé</span>` : `<span class="badge bg-gray"><i class="fas fa-clock"></i> En attente</span>`;
                const btnHTML = isEntre ? `<button class="btn-autoriser" disabled><i class="fas fa-check"></i> Validé</button>` : `<button class="btn-autoriser" onclick="ouvrirModal(${eleve.id})"><i class="fas fa-sign-in-alt"></i> Autoriser</button>`;

                row.innerHTML = `
                    <td data-label="Profil Étudiant">
                        <div class="student-identity">
                            <div class="student-avatar"><i class="fas fa-user"></i></div>
                            <div>
                                <span class="student-name">${eleve.nom} ${eleve.prenom}</span>
                                <span class="student-ddn"><i class="fas fa-birthday-cake"></i> ${eleve.ddn}</span>
                            </div>
                        </div>
                    </td>
                    <td data-label="Classe"><span class="class-badge">${eleve.classe}</span></td>
                    <td data-label="Statut">${badgeHTML}</td>
                    <td data-label="Action">${btnHTML}</td>
                `;
                tbody.appendChild(row);
            });
        }

        /* --- MODAL AUTORISATION --- */
        function ouvrirModal(id) {
            const el = eleves_bdd.find(e => e.id === id);
            if(!el) return;
            document.getElementById('modalStudentId').value = id;
            document.getElementById('modalStudentName').innerHTML = `<i class="fas fa-user-circle" style="color:var(--primary); font-size:1.5rem; margin-right:10px; vertical-align:middle;"></i> ${el.prenom} <strong>${el.nom}</strong> <br><span style="font-size:0.9rem; color:var(--text-muted); font-weight:normal; margin-left:35px; display:inline-block; margin-top:5px;">Classe : ${el.classe}</span>`;
            document.getElementById('modalMotif').value = "Oubli de carte";
            document.getElementById('modalMotifAutre').classList.add('hidden');
            document.getElementById('modalAutorisation').style.display = 'block';
        }

        function fermerModal() { document.getElementById('modalAutorisation').style.display = 'none'; }
        
        function checkMotifAutre() {
            if(document.getElementById('modalMotif').value === 'Autre') document.getElementById('modalMotifAutre').classList.remove('hidden');
            else document.getElementById('modalMotifAutre').classList.add('hidden');
        }

        function validerEntree() {
            const id = parseInt(document.getElementById('modalStudentId').value);
            let motif = document.getElementById('modalMotif').value;
            if(motif === 'Autre') motif = document.getElementById('modalMotifAutre').value.trim() || "Non précisé";

            const index = eleves_bdd.findIndex(e => e.id === id);
            if(index > -1) {
                eleves_bdd[index].etat = "entré";
                vibrer('success'); showToast(`${eleves_bdd[index].prenom} autorisé(e)`, "success");
                
                const time = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
                historique.unshift({ id_eleve: id, time: time, nom: `${eleves_bdd[index].nom} ${eleves_bdd[index].prenom}`, motif: motif, classe: eleves_bdd[index].classe }); 
                
                saveData(); filtrerBDD(); renderHistory(); updateChart(); fermerModal();
            }
        }

        /* --- ANNULATION D'UNE ENTRÉE --- */
        function annulerEntree(id_eleve) {
            const indexEleve = eleves_bdd.findIndex(e => e.id === id_eleve);
            if (indexEleve > -1) eleves_bdd[indexEleve].etat = "non_entré";

            const indexHisto = historique.findIndex(h => h.id_eleve === id_eleve);
            if (indexHisto > -1) {
                const nomAnnule = historique[indexHisto].nom;
                historique.splice(indexHisto, 1);
                vibrer('error'); 
                showToast(`Annulé pour ${nomAnnule}`, "warning");
            }

            saveData(); filtrerBDD(); renderHistory(); updateChart();
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = '';
            if(historique.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); font-size:0.9rem; padding:10px;">Aucune entrée manuelle.</div>';
                return;
            }
            
            historique.slice(0, 15).forEach(h => {
                container.innerHTML += `
                    <div class="history-item">
                        <div class="history-content">
                            <div style="margin-bottom:4px;"><span class="history-time">${h.time}</span> <strong style="color:var(--text-main)">${h.nom}</strong> <span style="color:var(--text-muted); font-size:0.8rem">(${h.classe})</span></div>
                            <div style="color:var(--text-muted); font-size:0.9rem"><i class="fas fa-caret-right" style="color:var(--accent);"></i> Motif : ${h.motif}</div>
                        </div>
                        <button class="btn-undo" onclick="annulerEntree(${h.id_eleve})" title="Annuler cette autorisation">
                            <i class="fas fa-undo"></i> Annuler
                        </button>
                    </div>`;
            });
        }

        /* --- GRAPHIQUE (CHART.JS) --- */
        let myChart = null;
        function updateChart() {
            const ctx = document.getElementById('motifsChart').getContext('2d');
            
            const motifsCount = {};
            historique.forEach(h => {
                let m = h.motif.startsWith("Oubli") ? "Oubli" : 
                        h.motif.startsWith("Perte") ? "Perte/Vol" : 
                        h.motif.startsWith("Nouvel") ? "Nouveau" : "Autre";
                motifsCount[m] = (motifsCount[m] || 0) + 1;
            });

            if(Object.keys(motifsCount).length === 0) motifsCount["Aucune donnée"] = 1;

            if(myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(motifsCount),
                    datasets: [{
                        data: Object.values(motifsCount),
                        backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6'],
                        borderWidth: 0, hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { boxWidth: 10, padding: 10, font:{family: "'Plus Jakarta Sans', sans-serif", size: 11} } } },
                    cutout: '65%'
                }
            });
        }

    </script>
</body>
</html>
